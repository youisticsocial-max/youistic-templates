<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | {{CLINIC_NAME}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .page-header {
            padding: 8rem 0 4rem 0;
            background: var(--surface-dark);
            text-align: center;
        }

        .gallery-masonry {
            column-count: 3;
            column-gap: 1.5rem;
        }

        @media(max-width: 992px) {
            .gallery-masonry { column-count: 2; }
        }

        @media(max-width: 576px) {
            .gallery-masonry { column-count: 1; }
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(45,35,35,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition-fast);
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay i {
            color: white;
            font-size: 2rem;
        }
        
        .filter-menu {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.5rem 1.5rem;
            border-radius: var(--border-radius-pill);
            cursor: pointer;
            transition: var(--transition-fast);
            font-family: var(--font-body);
        }
        
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary-color);
            color: var(--white);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container navbar-container">
            <a href="index.html" class="nav-brand">
                <img src="{{LOGO_URL}}" alt="{{CLINIC_NAME}}">
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
                <li><a href="collections.html" class="nav-link">Collections</a></li>
                <li><a href="custom-cakes.html" class="nav-link">Custom Cakes</a></li>
                <li><a href="gallery.html" class="nav-link active">Gallery</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="tel:{{PHONE}}" class="btn btn-primary"><i class="fas fa-phone-alt"></i> Order Now</a>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container reveal">
            <h1 class="hero-title" style="color: var(--text-color); font-size: 3.5rem;">Our Visual Story</h1>
            <p class="section-subtitle">A glimpse into our kitchen, creations, and celebrations.</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="filter-menu reveal">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Cakes</button>
                <button class="filter-btn">Behind The Scenes</button>
                <button class="filter-btn">Events</button>
            </div>

            <div class="gallery-masonry reveal">
                <div class="gallery-item">
                    <img src="assets/cake-decoration.jpg" alt="Cake Decoration" onerror="this.src='https://images.unsplash.com/photo-1556217646-601e3b5e43a9?q=80&w=800&auto=format&fit=crop'">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="assets/macaron.jpg" alt="Macarons" onerror="this.src='https://images.unsplash.com/photo-1569864358642-9d1684040f43?q=80&w=800&auto=format&fit=crop'">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="assets/wedding-cake.jpg" alt="Wedding Cake" onerror="this.src='https://images.unsplash.com/photo-1535254973040-607b474cb50d?q=80&w=800&auto=format&fit=crop'">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="assets/bakery-interior.jpg" alt="Bakery Interior" onerror="this.src='https://images.unsplash.com/photo-1517433670267-08bbd4be890f?q=80&w=800&auto=format&fit=crop'">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="assets/dessert.jpg" alt="Dessert Plating" onerror="this.src='https://images.unsplash.com/photo-1488477181946-6428a0291777?q=80&w=800&auto=format&fit=crop'">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="assets/cookies.jpg" alt="Cookies" onerror="this.src='https://images.unsplash.com/photo-1499636136210-6f4ee915583e?q=80&w=800&auto=format&fit=crop'">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Placeholder -->
    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2024 {{CLINIC_NAME}}. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
